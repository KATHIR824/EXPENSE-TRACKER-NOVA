# Optional MySQL profile. Activate with:
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=mysql
# or, running the built jar:
#   java -jar target/expense-tracker-1.0.0.jar --spring.profiles.active=mysql
#
# Set DB_USERNAME / DB_PASSWORD as environment variables, or replace the
# defaults below directly. Do not commit real credentials to source control.
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/expense_tracker?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
