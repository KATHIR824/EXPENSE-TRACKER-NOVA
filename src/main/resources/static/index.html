<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dre Russ | Money, in motion</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">

    <!-- async (not defer): these are optional/non-blocking libraries used opportunistically by
         the app (see the `if (window.lucide)` / chart guards in app.js and the view files). Using
         `defer` here forced the browser to wait for these third-party CDN requests to finish, in
         order, before DOMContentLoaded could fire — and since app.js only boots on DOMContentLoaded,
         a slow/blocked CDN request (ad blockers, flaky network, unpkg's "@latest" resolution) left
         the app stuck forever on the boot-loader spinner. async lets them load independently without
         gating our own app's startup. -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" async></script>
    <script src="https://unpkg.com/lucide@0.469.0" async></script>

    <script type="module" src="/js/app.js" defer></script>
</head>
<body>
<div class="bg-scene" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="orb orb-c"></div>
    <div class="grid-floor"></div>
</div>

<div id="app" class="app-container">
    <div class="boot-loader">
        <div class="boot-cube">
            <div class="face f1"></div><div class="face f2"></div><div class="face f3"></div>
            <div class="face f4"></div><div class="face f5"></div><div class="face f6"></div>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container"></div>
</body>
</html>
